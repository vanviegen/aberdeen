<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Aberdeen dev tools demo</title>
	<style>
		body { font-family: sans-serif; margin: 2rem; max-width: 640px; }
		button { margin: 2px; padding: 4px 8px; }
		.item { padding: 4px 8px; border: 1px solid #ddd; margin: 2px 0; border-radius: 4px; }
		h2 { margin-top: 1.5rem; }
	</style>
</head>
<body>
	<h1>Aberdeen dev tools demo</h1>
	<p>Open with <code>?abdev=1</code> or press Ctrl/Cmd+Alt+A.</p>
	<div id="app"></div>

	<script type="module">
		import A, { proxy, onEach } from '../dist/src/aberdeen.dev.js';

		const $state = proxy({
			count: 0,
			items: [
				{ id: 1, name: 'Apple', qty: 3 },
				{ id: 2, name: 'Banana', qty: 7 },
				{ id: 3, name: 'Cherry', qty: 1 },
			],
		});

		A.mount(document.getElementById('app'), () => {
			A('h2#Counter');
			A('div', () => {
				A('span#Count: ' + $state.count);
			});
			A('button#+1', { click: () => $state.count++ });
			A('button#-1', { click: () => $state.count-- });

			A('h2#Items');
			onEach($state.items, ($item) => {
				A('div.item', () => {
					A('span#' + $item.name + ' × ' + $item.qty + ' ');
					A('button#more', { click: () => $item.qty++ });
				});
			}, ($item) => $item.id);

			A('div', () => {
				A('button#Add item', { click: () => {
					const id = ($state.items.length ? Math.max(...$state.items.map(i => i.id)) : 0) + 1;
					$state.items.push({ id, name: 'Item ' + id, qty: 1 });
				}});
				A('button#Remove last', { click: () => $state.items.pop() });
			});
		});

		// Auto-bump the counter so "flash on redraw" has something to show.
		setInterval(() => { $state.count++; }, 2000);
	</script>
</body>
</html>
